# Все параметры (порты, хосты, URL и т.д.) задаются через env-файлы в docker/compose/:
#   --env-file docker/compose/.cont_one_app.env
#   --env-file docker/compose/.cont_one_app.secrets.env
services:
  db:
    image: postgres:16
    container_name: kanban_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - kanban_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    container_name: kanban_backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      APP_HOST: ${APP_HOST}
      ENABLE_HTTPS: ${ENABLE_HTTPS}
      FRONTEND_HTTP_PORT: ${FRONTEND_HTTP_PORT}
      FRONTEND_HTTPS_PORT: ${FRONTEND_HTTPS_PORT}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
    volumes:
      - kanban_uploads:/app/backend/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4000/health', r => { r.resume(); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 5

  frontend:
    container_name: kanban_frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      ENABLE_HTTPS: ${ENABLE_HTTPS}
    ports:
      - "${FRONTEND_HTTP_PORT}:80"
      - "${FRONTEND_HTTPS_PORT}:443"
    volumes:
      - ${CERTS_PATH}:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: kanban_default

volumes:
  kanban_pg:
    name: kanban_pg
  kanban_uploads:
    name: kanban_uploads
