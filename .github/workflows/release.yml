name: Release

on:
  push:
    tags:
      - 'v*'  # Срабатывает при создании тега вида v1.0.0, v1.2.3 и т.д.

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      # Коммит, на который указывает тег — это снимок для архивов Source code на GitHub.
      # Раньше bump делался только в main, тег оставался на старом SHA → в zip/tar.gz была прошлая версия.
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Extract version from tag
        id: extract_version
        run: |
          # Убираем префикс 'v' из тега (например, v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update root package.json
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          npm pkg set version="$VERSION"

      - name: Update backend package.json
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          npm pkg set version="$VERSION" -w backend

      - name: Update frontend package.json
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          npm pkg set version="$VERSION" -w frontend

      - name: Commit bump, merge to main, move tag to released snapshot
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json backend/package.json frontend/package.json
          if git diff --staged --quiet; then
            echo "Version in tree already matches tag; archives and main are in sync."
            exit 0
          fi

          git commit -m "chore: update version to ${{ steps.extract_version.outputs.version }}"

          BUMP_SHA=$(git rev-parse HEAD)

          git fetch origin main
          git checkout main
          git pull origin main --no-rebase
          git merge "$BUMP_SHA" -m "chore: merge version ${{ steps.extract_version.outputs.version }} for ${TAG_NAME}"

          git push origin main

          # Переносим лёгкий тег на коммит с актуальными package.json — тогда исходные архивы релиза совпадают с версией.
          git tag -f "$TAG_NAME" HEAD
          git push origin "refs/tags/$TAG_NAME" --force
