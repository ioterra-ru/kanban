name: Release

on:
  push:
    tags:
      - 'v*'  # Срабатывает при создании тега вида v1.0.0, v1.2.3 и т.д.

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # Обновляем версию в основной ветке

      - name: Extract version from tag
        id: extract_version
        run: |
          # Убираем префикс 'v' из тега (например, v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update root package.json
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          npm pkg set version="$VERSION"

      - name: Update backend package.json
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          npm pkg set version="$VERSION" -w backend

      - name: Update frontend package.json
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          npm pkg set version="$VERSION" -w frontend

      - name: Commit and push version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add package.json backend/package.json frontend/package.json
          # Проверяем, есть ли изменения перед коммитом
          if ! git diff --staged --quiet; then
            git commit -m "chore: update version to ${{ steps.extract_version.outputs.version }}"
            git push origin main
          else
            echo "No version changes to commit"
          fi
