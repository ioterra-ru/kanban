# Все параметры (порты, хосты, URL и т.д.) задаются через env-файлы в docker/compose/:
#   --env-file docker/compose/.cont_one_app.env
#   --env-file docker/compose/.cont_one_app.secrets.env
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - kanban_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  adminer:
    image: adminer:4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      # Формируются из APP_HOST и портов, если не заданы в env (для HTTP задать в .cont_one_app.env)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://${APP_HOST}:${FRONTEND_HTTPS_PORT}}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://${APP_HOST}:${FRONTEND_HTTPS_PORT},https://localhost:${FRONTEND_HTTPS_PORT},https://127.0.0.1:${FRONTEND_HTTPS_PORT}}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
    volumes:
      - kanban_uploads:/app/backend/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      ENABLE_HTTPS: ${ENABLE_HTTPS}
    ports:
      - "${FRONTEND_HTTP_PORT}:80"
      - "${FRONTEND_HTTPS_PORT}:443"
    volumes:
      - ${CERTS_PATH}:/etc/nginx/certs:ro
    depends_on:
      - backend
      - adminer

volumes:
  kanban_pg:
  kanban_uploads:
